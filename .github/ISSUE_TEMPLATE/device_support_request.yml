name: Device support request
description: Request future support for a device family.
title: "[Device Support]: "
labels: ["device-support"]
body:
  - type: markdown
    attributes:
      value: |
        Request future device support here. This does not enable real hardware execution.
  - type: input
    id: device_family
    attributes:
      label: Device family
      placeholder: conveyor_belt, mobile_robot, lab_instrument, etc.
    validations:
      required: true
  - type: textarea
    id: use_case
    attributes:
      label: Use case
      placeholder: What workflow should this device support in simulation?
    validations:
      required: true
  - type: textarea
    id: capabilities
    attributes:
      label: Expected capabilities
      placeholder: List likely commands, read-only state, safety boundaries, and unsupported actions.
    validations:
      required: true
  - type: dropdown
    id: risk
    attributes:
      label: Risk level
      options:
        - low-risk simulation
        - read-only simulation
        - medium-risk, needs safety review
        - high-risk, likely not suitable
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety boundary
      options:
        - label: I understand Open Reality is currently simulation-first.
          required: true
        - label: I am not requesting unsafe real device execution.
          required: true
        - label: I understand realAdapterEnabled must remain false.
          required: true
