name: Submit Reality Asset
description: Propose a simulation-only community Reality Asset draft.
title: "Reality Asset: "
labels: ["reality-asset", "community-draft"]
body:
  - type: markdown
    attributes:
      value: |
        Community Reality Assets are descriptive, unverified, and simulation-only by default.
        Real execution is not accepted in community submissions.
  - type: input
    id: device-name
    attributes:
      label: Device name
      placeholder: Community Example Drone
    validations:
      required: true
  - type: input
    id: device-category
    attributes:
      label: Device category
      placeholder: drone, robot, lab device, factory sensor, smart device
    validations:
      required: true
  - type: textarea
    id: intended-use
    attributes:
      label: Intended use case
      description: Describe the simulation-only workflow this asset should represent.
    validations:
      required: true
  - type: textarea
    id: capabilities
    attributes:
      label: Capabilities
      description: List descriptive, simulation-only capabilities. Do not include adapter code.
    validations:
      required: true
  - type: textarea
    id: safety-boundaries
    attributes:
      label: Safety boundaries
      description: Explain blocked actions, unsupported actions, and safety assumptions.
    validations:
      required: true
  - type: textarea
    id: supported-prompts
    attributes:
      label: Example supported prompts
      placeholder: "Simulate a drone inspection pass over zone A"
    validations:
      required: true
  - type: textarea
    id: unsupported-prompts
    attributes:
      label: Example unsupported prompts
      placeholder: "Take off and fly the real drone"
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: Why this device should be a Reality Asset
    validations:
      required: true
  - type: dropdown
    id: real-hardware
    attributes:
      label: Does this require real hardware execution?
      description: Real execution is not accepted in community submissions.
      options:
        - "No. This is simulation-only."
        - "Yes. I understand this cannot be accepted as a community asset."
    validations:
      required: true
  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmations
      options:
        - label: I understand this is simulation-only
          required: true
        - label: I will not submit real adapter code
          required: true
        - label: I will not include tokens, endpoints, shell commands, or secrets
          required: true
        - label: I understand all community assets are unverified by default
          required: true
