name: Reality Asset request
description: Propose a simulation-first Reality Asset Package.
title: "[Reality Asset]: "
labels: ["reality-asset"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template to propose a Reality Asset. Submissions must stay simulation-only, read-only, or Coming Soon.
  - type: input
    id: asset_name
    attributes:
      label: Asset name
      placeholder: Generic benchtop sensor
    validations:
      required: true
  - type: input
    id: device_type
    attributes:
      label: Device type
      placeholder: sensor_box, camera_sensor, desktop_fan, etc.
    validations:
      required: true
  - type: dropdown
    id: support_level
    attributes:
      label: Requested support level
      options:
        - simulation_only
        - read_only
        - coming_soon
    validations:
      required: true
  - type: textarea
    id: capabilities
    attributes:
      label: Capability contract
      placeholder: List the capabilities this asset should expose and the unsupported actions it must reject.
    validations:
      required: true
  - type: textarea
    id: prompts
    attributes:
      label: Example prompts
      placeholder: Include safe, unsupported, and unsafe prompts.
    validations:
      required: true
  - type: textarea
    id: safety_notes
    attributes:
      label: Safety and adapter boundary notes
      placeholder: Explain why this asset should not enable real execution and how unsafe prompts are handled.
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety boundary
      options:
        - label: I understand Open Reality is currently simulation-first.
          required: true
        - label: I am not requesting unsafe real device execution.
          required: true
        - label: I understand realAdapterEnabled must remain false.
          required: true
