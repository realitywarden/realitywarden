name: Bug report
description: Report a reproducible issue in RealityWarden.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. RealityWarden is currently simulation-first and does not enable real device execution.
  - type: input
    id: version
    attributes:
      label: Version or commit
      description: Public release tag or commit hash.
      placeholder: v0.2.0-alpha or commit hash
    validations:
      required: true
  - type: dropdown
    id: device
    attributes:
      label: Device path
      options:
        - robot_arm
        - smart_light
        - camera_sensor
        - mobile_robot / Coming Soon
        - conveyor_belt / Coming Soon
        - plc_cabinet / Coming Soon
        - lab_instrument / Coming Soon
        - warehouse_rack / Coming Soon
        - sensor_box / Coming Soon
        - other
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: Describe the exact prompt, selected device, and what happened.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety boundary
      options:
        - label: I understand Open Reality is currently simulation-first.
          required: true
        - label: I am not requesting unsafe real device execution.
          required: true
        - label: I understand realAdapterEnabled must remain false.
          required: true
